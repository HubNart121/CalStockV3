<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Master Pro V11 - Optimize Display</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #6366f1;
            --dark: #0f172a;
            --accent: #f59e0b;
            --bg: #f8fafc;
            --danger: #ef4444;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .app-container {
            width: 100%; max-width: 480px;
            background: #ffffff; border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            overflow: hidden; margin-bottom: 24px;
        }

        /* Header Section */
        .header {
            background: var(--dark); color: white;
            padding: 40px 25px; position: relative;
        }

        .header .date {
            position: absolute; top: 15px; right: 25px;
            font-size: 0.75rem; opacity: 0.5; font-family: 'Inter', sans-serif;
        }

        .header h1 {
            font-family: 'Inter', sans-serif; font-size: 2.8rem; margin: 0;
            font-weight: 800; color: var(--primary); line-height: 1; letter-spacing: -1px;
        }

        .header .sub-header {
            margin-top: 10px; font-weight: 300; opacity: 0.9;
            border-left: 3px solid var(--primary); padding-left: 12px;
            font-size: 0.95rem; min-height: 1.2rem;
        }

        .content { padding: 20px; }

        /* Input Cards */
        .section-title {
            font-size: 0.75rem; font-weight: 700; color: #94a3b8;
            text-transform: uppercase; margin: 20px 0 10px 0;
            display: flex; align-items: center; letter-spacing: 1px;
        }

        .section-title::after { content: ""; flex: 1; height: 1px; background: #f1f5f9; margin-left: 10px; }

        .input-card {
            background: #ffffff; border: 1.5px solid #f1f5f9; border-radius: 16px;
            padding: 10px 15px; margin-bottom: 10px;
        }

        .label { font-size: 0.7rem; color: #64748b; font-weight: 500; margin-bottom: 2px; display: block; }
        
        input, textarea {
            border: none; background: transparent; width: 100%;
            font-size: 1rem; font-weight: 700; color: var(--dark);
            font-family: 'Inter', sans-serif; outline: none;
        }

        /* Average Table */
        .buy-table { width: 100%; border-collapse: collapse; }
        .buy-table th { text-align: left; font-size: 0.65rem; color: #94a3b8; padding: 8px 5px; }
        
        .row-box { background: #f8fafc; border-radius: 10px; padding: 6px 10px; display: flex; align-items: center; }
        .row-box input { font-size: 0.9rem; }
        
        .btn-add {
            width: 100%; padding: 12px; background: #f5f3ff; color: var(--secondary);
            border: 2px dashed #ddd6fe; border-radius: 14px; cursor: pointer;
            font-weight: 700; margin-top: 8px; font-size: 0.85rem;
        }

        /* Dividend Card */
        .div-card {
            background: linear-gradient(135deg, #fffbeb 0%, #fff7ed 100%);
            border: 1px solid #ffedd5; border-radius: 20px; padding: 18px; margin: 15px 0;
        }

        .div-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .div-val { font-size: 1.4rem; font-weight: 800; color: #c2410c; font-family: 'Inter', sans-serif; }

        /* Summary Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .summary-box { background: #ffffff; border: 1.5px solid #f1f5f9; border-radius: 16px; padding: 12px; overflow: hidden; }
        .val-text { 
            font-size: 1.1rem; font-weight: 700; font-family: 'Inter', sans-serif; 
            display: block; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* Final Result Card */
        .profit-card {
            background: #0f172a; color: white; border-radius: 24px;
            padding: 25px 15px; text-align: center; margin-top: 15px;
            min-height: 120px; display: flex; flex-direction: column; justify-content: center;
        }

        .profit-card .amount { 
            font-size: 2.5rem; /* Base size */
            font-weight: 800; color: var(--primary); 
            font-family: 'Inter', sans-serif; line-height: 1.1; margin: 8px 0;
            word-break: break-all;
            transition: font-size 0.2s;
        }
        
        .amount.negative { color: var(--danger); }

        .badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15); color: var(--primary);
            padding: 5px 15px; border-radius: 100px; font-size: 0.85rem; font-weight: 700;
        }
        .badge.negative { background: rgba(239, 68, 68, 0.15); color: var(--danger); }

        /* Buttons */
        .controls { width: 100%; max-width: 480px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .btn {
            padding: 15px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer;
            font-size: 0.95rem;
        }
        .btn-main { background: var(--dark); color: white; grid-column: span 2; }
        .btn-save { background: var(--primary); color: white; }

        @media print {
            .controls, .btn-add, .delete-row { display: none !important; }
            body { padding: 0; background: white; }
            .app-container { box-shadow: none; border-radius: 0; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app-container" id="capture-area">
        <div class="header">
            <div class="date" id="disp-date">23/03/2026</div>
            <h1 id="disp-stock">KTC</h1>
            <div class="sub-header" id="disp-details">สรุปแผนการลงทุนและการรับปันผล</div>
        </div>

        <div class="content">
            <div class="grid-2">
                <div class="input-card">
                    <span class="label">ชื่อหุ้น</span>
                    <input type="text" id="stockName" value="KTC" oninput="updateUI()">
                </div>
                <div class="input-card">
                    <span class="label">วันที่คำนวณ</span>
                    <input type="date" id="calcDate" oninput="updateUI()">
                </div>
            </div>

            <div class="section-title">รายการซื้อสะสม</div>
            <table class="buy-table">
                <thead>
                    <tr>
                        <th style="width: 25px;">#</th>
                        <th>ราคาซื้อ (฿)</th>
                        <th>จำนวนหุ้น</th>
                        <th style="width: 30px;"></th>
                    </tr>
                </thead>
                <tbody id="buy-rows"></tbody>
            </table>
            <button class="btn-add" onclick="addRow()">+ เพิ่มรอบการซื้อ</button>

            <div class="div-card">
                <div class="div-grid">
                    <div>
                        <span class="label" style="color:#9a3412">ปันผลต่อหุ้น (DPS)</span>
                        <input type="number" id="divPerShare" value="1.77" step="0.01" oninput="updateUI()" style="color:#c2410c; font-size: 1.3rem;">
                    </div>
                    <div style="text-align: right;">
                        <span class="label">Dividend Yield</span>
                        <div class="div-val" id="disp-divYield" style="font-size: 1.3rem;">4.64%</div>
                    </div>
                </div>
                <div style="margin-top: 10px; border-top: 1.5px dashed #fed7aa; padding-top: 8px; display: flex; justify-content: space-between; align-items: center;">
                    <span class="label" style="color:#9a3412">ปันผลรวมที่ได้รับ</span>
                    <span style="font-weight: 800; color:#c2410c; font-size: 1.2rem; font-family:'Inter'" id="disp-totalDiv">฿0</span>
                </div>
            </div>

            <div class="section-title">สรุปภาพรวม</div>
            <div class="grid-2" style="margin-bottom: 10px;">
                <div class="summary-box">
                    <span class="label">ต้นทุนเฉลี่ย</span>
                    <span class="val-text" id="disp-avgPrice">฿0.00</span>
                </div>
                <div class="summary-box">
                    <span class="label">ราคาขายเป้าหมาย</span>
                    <input type="number" id="sellPrice" value="35.00" oninput="updateUI()" style="margin-top:2px;">
                </div>
            </div>
            <div class="grid-2">
                <div class="summary-box">
                    <span class="label">จำนวนหุ้นรวม</span>
                    <span class="val-text" id="disp-totalVol">0</span>
                </div>
                <div class="summary-box">
                    <span class="label">เงินลงทุนทั้งหมด</span>
                    <span class="val-text" id="disp-totalInvest">฿0</span>
                </div>
            </div>

            <div class="profit-card">
                <span class="label" style="color:rgba(255,255,255,0.5)">กำไรสุทธิคาดการณ์ (หักค่าธรรมเนียม)</span>
                <div class="amount" id="disp-netProfit">฿0</div>
                <div>
                    <span class="badge" id="disp-margin">Margin: 0%</span>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-main" onclick="window.print()">บันทึกเป็น PDF</button>
        <button class="btn btn-save" onclick="exportPNG()">บันทึกรูป PNG</button>
    </div>

    <script>
        function addRow(p = "", v = "") {
            const tbody = document.getElementById('buy-rows');
            const rowCount = tbody.rows.length + 1;
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="text-align:center; color:#94a3b8; font-weight:bold; font-size:0.75rem;">${rowCount}</td>
                <td><div class="row-box"><input type="number" class="row-price" value="${p}" step="0.01" oninput="updateUI()"></div></td>
                <td><div class="row-box"><input type="number" class="row-vol" value="${v}" oninput="updateUI()"></div></td>
                <td style="text-align:right;"><button class="delete-row" onclick="this.parentElement.parentElement.remove(); updateUI();" style="border:none; background:none; color:#ef4444; cursor:pointer; font-size:1.2rem;">&times;</button></td>
            `;
            tbody.appendChild(tr);
            updateUI();
        }

        function updateUI() {
            const name = document.getElementById('stockName').value || 'STOCK';
            const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;
            const divPerShare = parseFloat(document.getElementById('divPerShare').value) || 0;

            const priceInputs = document.querySelectorAll('.row-price');
            const volInputs = document.querySelectorAll('.row-vol');
            
            let totalVol = 0;
            let totalInvest = 0;

            priceInputs.forEach((input, i) => {
                const p = parseFloat(input.value) || 0;
                const v = parseFloat(volInputs[i].value) || 0;
                totalVol += v;
                totalInvest += (p * v);
            });

            const avgPrice = totalVol > 0 ? totalInvest / totalVol : 0;
            const totalSellValue = sellPrice * totalVol;
            const buyFees = totalInvest * 0.0015;
            const sellFees = totalSellValue * 0.0015;
            const netProfit = (totalSellValue - totalInvest) - (buyFees + sellFees);
            
            const margin = totalInvest > 0 ? (netProfit / totalInvest) * 100 : 0;
            const totalDiv = divPerShare * totalVol;
            const divYield = avgPrice > 0 ? (divPerShare / avgPrice) * 100 : 0;

            // UI Elements
            document.getElementById('disp-stock').innerText = name.toUpperCase();
            document.getElementById('disp-totalVol').innerText = totalVol.toLocaleString();
            document.getElementById('disp-avgPrice').innerText = '฿' + avgPrice.toFixed(2);
            document.getElementById('disp-totalInvest').innerText = '฿' + Math.floor(totalInvest).toLocaleString();
            
            // Profit Display with Scaling
            const profitEl = document.getElementById('disp-netProfit');
            const marginEl = document.getElementById('disp-margin');
            const profitText = (netProfit >= 0 ? '฿' : '-฿') + Math.abs(Math.floor(netProfit)).toLocaleString();
            profitEl.innerText = profitText;
            
            // Auto Scale Font
            if (profitText.length > 10) profitEl.style.fontSize = "1.8rem";
            else if (profitText.length > 8) profitEl.style.fontSize = "2.1rem";
            else profitEl.style.fontSize = "2.5rem";

            // Color Logic
            if (netProfit < 0) {
                profitEl.classList.add('negative');
                marginEl.classList.add('negative');
            } else {
                profitEl.classList.remove('negative');
                marginEl.classList.remove('negative');
            }

            document.getElementById('disp-margin').innerText = 'Margin: ' + margin.toFixed(2) + '%';
            document.getElementById('disp-totalDiv').innerText = '฿' + Math.floor(totalDiv).toLocaleString();
            document.getElementById('disp-divYield').innerText = divYield.toFixed(2) + '%';

            const rawDate = document.getElementById('calcDate').value;
            if(rawDate) {
                const [y, m, d] = rawDate.split('-');
                document.getElementById('disp-date').innerText = `${d}/${m}/${y}`;
            }
        }

        window.onload = function() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('calcDate').value = today;
            addRow(30.71, 8100);
            updateUI();
        };

        function exportPNG() {
            const area = document.getElementById('capture-area');
            html2canvas(area, { scale: 3, backgroundColor: "#f8fafc" }).then(canvas => {
                const link = document.createElement('a');
                link.download = `Stock-Report.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
